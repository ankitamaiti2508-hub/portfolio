<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IntelliVault — Internal Knowledge Agent</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    .header {
      background: #1a1d27;
      border-bottom: 1px solid #2d3148;
      padding: 16px 32px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    .header-logo {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .header-title { font-size: 18px; font-weight: 700; color: #f1f5f9; }
    .header-subtitle { font-size: 12px; color: #64748b; margin-top: 1px; }
    .header-badge {
      margin-left: auto;
      background: #1e2535;
      border: 1px solid #2d3148;
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 11px;
      color: #6366f1;
      font-weight: 500;
    }

    /* Main layout */
    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* Sidebar */
    .sidebar {
      width: 260px;
      background: #1a1d27;
      border-right: 1px solid #2d3148;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex-shrink: 0;
    }
    .sidebar-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #475569;
      padding: 0 8px;
      margin-bottom: 4px;
    }
    .sidebar-section { margin-bottom: 16px; }
    .filter-select {
      width: 100%;
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 8px;
      color: #e2e8f0;
      padding: 8px 12px;
      font-size: 13px;
      outline: none;
      cursor: pointer;
    }
    .filter-select:focus { border-color: #6366f1; }

    .suggested-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #475569;
      padding: 0 8px;
      margin-bottom: 8px;
    }
    .suggestion-btn {
      width: 100%;
      text-align: left;
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 8px;
      color: #94a3b8;
      padding: 9px 12px;
      font-size: 12px;
      line-height: 1.4;
      cursor: pointer;
      transition: all 0.15s;
      margin-bottom: 6px;
    }
    .suggestion-btn:hover {
      background: #1e2535;
      border-color: #6366f1;
      color: #c7d2fe;
    }

    /* Chat area */
    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 32px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }
    .messages::-webkit-scrollbar { width: 6px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: #2d3148; border-radius: 3px; }

    /* Welcome state */
    .welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      text-align: center;
      gap: 12px;
      color: #475569;
      padding: 60px 20px;
    }
    .welcome-icon {
      width: 64px; height: 64px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      font-size: 32px;
      margin-bottom: 8px;
    }
    .welcome h2 { color: #e2e8f0; font-size: 22px; font-weight: 700; }
    .welcome p { font-size: 14px; max-width: 360px; line-height: 1.6; }

    /* Message bubbles */
    .message { display: flex; flex-direction: column; gap: 4px; }

    .msg-user {
      align-self: flex-end;
      max-width: 70%;
    }
    .msg-user .bubble {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: white;
      padding: 12px 16px;
      border-radius: 16px 16px 4px 16px;
      font-size: 14px;
      line-height: 1.6;
    }
    .msg-user .dept-tag {
      text-align: right;
      font-size: 11px;
      color: #6366f1;
      padding-right: 4px;
    }

    .msg-ai { align-self: flex-start; max-width: 85%; }
    .msg-ai .ai-header {
      display: flex; align-items: center; gap-8px;
      margin-bottom: 8px;
    }
    .ai-avatar {
      width: 28px; height: 28px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      margin-right: 8px;
      flex-shrink: 0;
    }
    .ai-name { font-size: 12px; color: #6366f1; font-weight: 600; }

    .answer-card {
      background: #1a1d27;
      border: 1px solid #2d3148;
      border-radius: 12px;
      padding: 16px 20px;
      font-size: 14px;
      line-height: 1.7;
      color: #cbd5e1;
    }

    .sources-section { margin-top: 12px; }
    .sources-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #475569;
      margin-bottom: 8px;
    }
    .sources-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .source-card {
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 8px;
      padding: 8px 12px;
      text-decoration: none;
      display: flex;
      flex-direction: column;
      gap: 3px;
      transition: all 0.15s;
      min-width: 180px;
      max-width: 240px;
    }
    .source-card:hover {
      border-color: #6366f1;
      background: #1e2535;
    }
    .source-rank {
      font-size: 10px;
      font-weight: 700;
      color: #6366f1;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .source-file {
      font-size: 12px;
      color: #e2e8f0;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .source-meta {
      font-size: 11px;
      color: #64748b;
    }
    .source-link-icon { color: #6366f1; font-size: 10px; }

    /* Loading */
    .msg-loading .answer-card {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #475569;
    }
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid #2d3148;
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Error */
    .error-card {
      background: #1f1315;
      border: 1px solid #5c2a2a;
      border-radius: 12px;
      padding: 14px 18px;
      font-size: 13px;
      color: #f87171;
    }

    /* Input bar */
    .input-bar {
      border-top: 1px solid #2d3148;
      background: #1a1d27;
      padding: 16px 32px 20px;
      flex-shrink: 0;
    }
    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }
    .input-wrapper {
      flex: 1;
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 12px;
      display: flex;
      align-items: center;
      padding: 2px 4px 2px 16px;
      transition: border-color 0.15s;
    }
    .input-wrapper:focus-within { border-color: #6366f1; }

    #question-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #e2e8f0;
      font-size: 14px;
      padding: 10px 0;
      resize: none;
      font-family: inherit;
      line-height: 1.5;
      max-height: 120px;
    }
    #question-input::placeholder { color: #475569; }

    .send-btn {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border: none;
      border-radius: 9px;
      width: 38px; height: 38px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      flex-shrink: 0;
      margin: 3px;
    }
    .send-btn:hover { opacity: 0.85; }
    .send-btn:active { transform: scale(0.95); }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .send-btn svg { width: 16px; height: 16px; fill: white; }

    .input-hint {
      font-size: 11px;
      color: #334155;
      margin-top: 8px;
      text-align: center;
    }
  </style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-logo">🔍</div>
  <div>
    <div class="header-title">IntelliVault</div>
    <div class="header-subtitle">Internal Knowledge Agent</div>
  </div>
  <div class="header-badge">● Live</div>
</div>

<div class="main">

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">Filter by Department</div>
      <select class="filter-select" id="dept-filter">
        <option value="">All Departments</option>
        <option value="Finance">Finance</option>
        <option value="Engineering">Engineering</option>
        <option value="HR">HR</option>
        <option value="Product">Product</option>
      </select>
    </div>

    <div class="sidebar-section">
      <div class="suggested-label">Suggested Questions</div>
      <button class="suggestion-btn" onclick="useSuggestion(this)">What was Q3 2024 revenue and which segment grew the most?</button>
      <button class="suggestion-btn" onclick="useSuggestion(this)">What were the key engineering achievements in Q3 2024?</button>
      <button class="suggestion-btn" onclick="useSuggestion(this)">What is the voluntary attrition rate and how does it compare to industry benchmarks?</button>
      <button class="suggestion-btn" onclick="useSuggestion(this)">What features shipped in Q3 2024 and what was the NPS score?</button>
      <button class="suggestion-btn" onclick="useSuggestion(this)">What are the Q4 2024 priorities across departments?</button>
      <button class="suggestion-btn" onclick="useSuggestion(this)">What security vulnerabilities were found in the penetration test?</button>
    </div>
  </div>

  <!-- Chat -->
  <div class="chat-area">
    <div class="messages" id="messages">
      <div class="welcome" id="welcome">
        <div class="welcome-icon">🧠</div>
        <h2>Ask IntelliVault</h2>
        <p>Ask any question about your company's internal documents. Answers are grounded in your actual data with source citations.</p>
      </div>
    </div>

    <div class="input-bar">
      <div class="input-row">
        <div class="input-wrapper">
          <textarea
            id="question-input"
            rows="1"
            placeholder="Ask a question about your company knowledge..."
          ></textarea>
        </div>
        <button class="send-btn" id="send-btn" onclick="sendQuestion()">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/>
          </svg>
        </button>
      </div>
      <div class="input-hint">Press Enter to send · Shift+Enter for new line</div>
    </div>
  </div>

</div>

<script>
  const WEBHOOK_URL = 'https://ankitamaiti.app.n8n.cloud/webhook/intellivault-query';

  const input = document.getElementById('question-input');
  const sendBtn = document.getElementById('send-btn');
  const messagesEl = document.getElementById('messages');
  const welcome = document.getElementById('welcome');

  // Auto-resize textarea
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 120) + 'px';
  });

  // Enter to send
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendQuestion();
    }
  });

  function useSuggestion(btn) {
    input.value = btn.textContent;
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 120) + 'px';
    input.focus();
  }

  function appendMessage(html) {
    if (welcome) welcome.style.display = 'none';
    messagesEl.insertAdjacentHTML('beforeend', html);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function formatFileName(name) {
    return name.replace(/_/g, ' ').replace(/\.[^.]+$/, '');
  }

  async function sendQuestion() {
    const question = input.value.trim();
    if (!question) return;

    const dept = document.getElementById('dept-filter').value;

    // Show user message
    appendMessage(`
      <div class="message msg-user">
        ${dept ? `<div class="dept-tag">🏷 ${dept}</div>` : ''}
        <div class="bubble">${escapeHtml(question)}</div>
      </div>
    `);

    input.value = '';
    input.style.height = 'auto';
    sendBtn.disabled = true;

    // Show loading
    const loadingId = 'loading-' + Date.now();
    appendMessage(`
      <div class="message msg-ai" id="${loadingId}">
        <div style="display:flex;align-items:center;margin-bottom:8px">
          <div class="ai-avatar">🔍</div>
          <span class="ai-name">IntelliVault</span>
        </div>
        <div class="answer-card msg-loading">
          <div class="spinner"></div>
          <span>Searching knowledge base and generating answer…</span>
        </div>
      </div>
    `);

    try {
      const body = { question };
      if (dept) body.department = dept;

      const res = await fetch(WEBHOOK_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });

      const data = await res.json();
      const item = Array.isArray(data) ? data[0] : data;

      // Build sources HTML
      let sourcesHtml = '';
      if (item.sources && item.sources.length > 0) {
        const cards = item.sources.map(s => `
          <a class="source-card" href="${s.url || '#'}" target="_blank" rel="noopener">
            <span class="source-rank">Source ${s.rank}</span>
            <span class="source-file">${formatFileName(s.file)}</span>
            <span class="source-meta">${s.department} · ${s.time_period}</span>
            ${s.url ? '<span class="source-link-icon">↗ Open in Drive</span>' : ''}
          </a>
        `).join('');
        sourcesHtml = `
          <div class="sources-section">
            <div class="sources-label">Sources</div>
            <div class="sources-grid">${cards}</div>
          </div>
        `;
      }

      // Replace loading with answer
      document.getElementById(loadingId).outerHTML = `
        <div class="message msg-ai">
          <div style="display:flex;align-items:center;margin-bottom:8px">
            <div class="ai-avatar">🔍</div>
            <span class="ai-name">IntelliVault</span>
          </div>
          <div class="answer-card">${escapeHtml(item.answer || 'No answer generated.')}</div>
          ${sourcesHtml}
        </div>
      `;

    } catch (err) {
      document.getElementById(loadingId).outerHTML = `
        <div class="message msg-ai">
          <div style="display:flex;align-items:center;margin-bottom:8px">
            <div class="ai-avatar">🔍</div>
            <span class="ai-name">IntelliVault</span>
          </div>
          <div class="error-card">⚠ Could not reach IntelliVault. Make sure your n8n workflow is published and active.<br><small style="opacity:0.7;margin-top:4px;display:block">${err.message}</small></div>
        </div>
      `;
    }

    sendBtn.disabled = false;
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/\n/g, '<br>');
  }
</script>

</body>
</html>
